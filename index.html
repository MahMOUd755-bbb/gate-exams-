<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;}

  :root{
    --cyan: #00f5ff;
    --magenta: #ff00aa;
    --green: #00ff88;
    --orange: #ff6600;
    --bg: #060810;
    --card-bg: rgba(0,245,255,0.04);
    --border: rgba(0,245,255,0.15);
  }

  body{
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .grid-bg{
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridMove{
    0%{background-position:0 0;}
    100%{background-position:50px 50px;}
  }

  .orb{
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb1{width:400px;height:400px;background:var(--cyan);top:-100px;left:-100px;animation-delay:0s;}
  .orb2{width:300px;height:300px;background:var(--magenta);bottom:-80px;right:-80px;animation-delay:-3s;}
  .orb3{width:200px;height:200px;background:var(--green);top:50%;left:60%;animation-delay:-5s;}
  @keyframes orbFloat{
    0%,100%{transform:translate(0,0);}
    50%{transform:translate(30px,-30px);}
  }

  .scanlines{
    position:fixed;inset:0;
    background: repeating-linear-gradient(
      0deg,transparent,transparent 2px,
      rgba(0,245,255,0.015) 2px,rgba(0,245,255,0.015) 4px
    );
    pointer-events:none;z-index:10;
  }

  .header{
    text-align:center;
    margin-bottom: 48px;
    position: relative;
    z-index:5;
    animation: fadeDown 0.8s ease both;
  }
  @keyframes fadeDown{from{opacity:0;transform:translateY(-30px);}to{opacity:1;transform:translateY(0);}}

  .header-label{
    font-family:'Rajdhani',sans-serif;
    font-size:11px;
    letter-spacing:6px;
    color: var(--cyan);
    text-transform:uppercase;
    margin-bottom:8px;
    opacity:0.7;
  }
  .header h1{
    font-family:'Orbitron',monospace;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    color: white;
    letter-spacing: 4px;
    text-transform: uppercase;
    position: relative;
  }
  .header h1 span{
    background: linear-gradient(135deg, var(--cyan), var(--magenta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-line{
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    margin: 14px auto 0;
    animation: linePulse 2s ease-in-out infinite;
  }
  @keyframes linePulse{0%,100%{opacity:0.5;width:80px;}50%{opacity:1;width:150px;}}

  .grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    position: relative;
    z-index:5;
    width: min(500px, 90vw);
  }

  .card{
    position: relative;
    padding: 28px 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    overflow: hidden;
    text-align: center;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    animation: cardIn 0.6s ease both;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  }
  .card:nth-child(1){animation-delay:0.1s; --accent: var(--cyan);}
  .card:nth-child(2){animation-delay:0.2s; --accent: var(--magenta);}
  .card:nth-child(3){animation-delay:0.3s; --accent: var(--green);}
  .card:nth-child(4){animation-delay:0.4s; --accent: var(--orange);}

  @keyframes cardIn{
    from{opacity:0;transform:translateY(20px) scale(0.95);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }

  .card::before{
    content:'';
    position:absolute;inset:0;
    background: linear-gradient(135deg, var(--accent) 0%, transparent 60%);
    opacity:0;
    transition: opacity 0.3s ease;
  }
  .card::after{
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity:0.6;
  }

  .card:hover{
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 0 30px rgba(0,245,255,0.12), 0 20px 40px rgba(0,0,0,0.5);
    border-color: var(--accent);
  }
  .card:hover::before{opacity:0.07;}

  .card-icon{
    font-size: 28px;
    margin-bottom: 10px;
    display: block;
    filter: drop-shadow(0 0 8px var(--accent));
    transition: transform 0.3s ease;
  }
  .card:hover .card-icon{transform: scale(1.2) rotate(-5deg);}

  .card-name{
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: white;
    margin-bottom: 4px;
  }
  .card-sub{
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    opacity: 0.7;
    text-transform: uppercase;
  }

  .corner{position:absolute;width:10px;height:10px;opacity:0.6;}
  .corner-tl{top:6px;left:6px;border-top:1px solid var(--accent);border-left:1px solid var(--accent);}
  .corner-br{bottom:6px;right:6px;border-bottom:1px solid var(--accent);border-right:1px solid var(--accent);}

  .status{
    margin-top: 36px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(0,245,255,0.4);
    text-transform: uppercase;
    position:relative;z-index:5;
    animation: fadeUp 1s ease 0.8s both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="scanlines"></div>

<div class="header">
  <div class="header-label">System Access</div>
  <h1>Exam <span>Gate</span></h1>
  <div class="header-line"></div>
</div>

<div class="grid">

  <div class="card" onclick="window.open('https://mahmoud755-bbb.github.io/gero-full-mcq-/', '_blank')">
    <div class="corner corner-tl"></div>
    <div class="corner corner-br"></div>
    <span class="card-icon">🧬</span>
    <div class="card-name">Gero</div>
    <div class="card-sub">Geriatrics</div>
  </div>

  <div class="card" onclick="window.open('https://mahmoud755-bbb.github.io/mcq-medical-/', '_blank')">
    <div class="corner corner-tl"></div>
    <div class="corner corner-br"></div>
    <span class="card-icon">💊</span>
    <div class="card-name">Med 2</div>
    <div class="card-sub">Medicine</div>
  </div>

  <div class="card" onclick="">
    <div class="corner corner-tl"></div>
    <div class="corner corner-br"></div>
    <span class="card-icon">🧠</span>
    <div class="card-name">Concept</div>
    <div class="card-sub">Theory</div>
  </div>

  <div class="card" onclick="">
    <div class="corner corner-tl"></div>
    <div class="corner corner-br"></div>
    <span class="card-icon">🚨</span>
    <div class="card-name">Emerg</div>
    <div class="card-sub">Emergency</div>
  </div>

</div>

<div class="status">
  <div class="dot"></div>
  Systems online · 4 modules
</div>

</body>
</html>
