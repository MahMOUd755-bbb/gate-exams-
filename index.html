<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;}

  :root{
    --cyan:#00f5ff;
    --magenta:#ff00aa;
    --green:#00ff88;
    --gold:#ffd700;
    --purple:#aa44ff;
    --bg:#060810;
  }

  body{
    background:var(--bg);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:'Rajdhani',sans-serif;
    overflow-x:hidden;
    position:relative;
    padding:30px 20px;
  }

  .grid-bg{
    position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,245,255,0.04) 1px,transparent 1px);
    background-size:50px 50px;
    animation:gridMove 20s linear infinite;
    pointer-events:none;
  }
  @keyframes gridMove{0%{background-position:0 0;}100%{background-position:50px 50px;}}

  .orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:0.16;pointer-events:none;animation:orbFloat 8s ease-in-out infinite;}
  .orb1{width:450px;height:450px;background:var(--cyan);top:-130px;left:-130px;animation-delay:0s;}
  .orb2{width:320px;height:320px;background:var(--magenta);bottom:-90px;right:-90px;animation-delay:-3s;}
  .orb3{width:220px;height:220px;background:var(--purple);top:45%;left:58%;animation-delay:-5s;}
  @keyframes orbFloat{0%,100%{transform:translate(0,0);}50%{transform:translate(28px,-28px);}}

  .scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,0.012) 2px,rgba(0,245,255,0.012) 4px);pointer-events:none;z-index:10;}

  /* HEADER */
  .header{text-align:center;margin-bottom:40px;position:relative;z-index:5;animation:fadeDown 0.8s ease both;}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-28px);}to{opacity:1;transform:translateY(0);}}
  .header-label{font-size:10px;letter-spacing:6px;color:var(--cyan);text-transform:uppercase;margin-bottom:8px;opacity:0.7;}
  .header h1{font-family:'Orbitron',monospace;font-size:clamp(26px,5vw,44px);font-weight:900;color:white;letter-spacing:4px;text-transform:uppercase;}
  .header h1 span{background:linear-gradient(135deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .header-line{width:100px;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);margin:12px auto 0;animation:linePulse 2s ease-in-out infinite;}
  @keyframes linePulse{0%,100%{opacity:0.4;width:70px;}50%{opacity:1;width:140px;}}

  /* CARD LIST */
  .card-list{
    display:flex;flex-direction:column;gap:12px;
    width:min(480px,92vw);
    position:relative;z-index:5;
  }

  /* MODULE CARD — horizontal strip */
  .mcard{
    position:relative;
    display:flex;align-items:center;gap:0;
    background:rgba(255,255,255,0.025);
    border:1px solid rgba(255,255,255,0.07);
    border-left:none;
    border-radius:2px;
    cursor:pointer;
    overflow:hidden;
    clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
    transition:transform 0.22s ease,border-color 0.22s ease;
    animation:cardIn 0.55s ease both;
    text-decoration:none;
  }
  .mcard:nth-child(1){animation-delay:0.08s;}
  .mcard:nth-child(2){animation-delay:0.16s;}
  .mcard:nth-child(3){animation-delay:0.24s;}
  .mcard:nth-child(4){animation-delay:0.32s;}

  @keyframes cardIn{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}

  /* Glow sweep on hover */
  .mcard::after{
    content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);
    transition:left 0.5s ease;pointer-events:none;
  }
  .mcard:hover::after{left:140%;}
  .mcard:hover{transform:translateX(5px) scale(1.01);border-color:var(--accent,rgba(0,245,255,0.35));}

  /* LEFT ACCENT BAR */
  .mcard-bar{
    width:4px;height:100%;min-height:72px;
    background:linear-gradient(180deg,var(--accent),transparent);
    flex-shrink:0;
    transition:width 0.2s;
  }
  .mcard:hover .mcard-bar{width:5px;}

  /* ICON BOX */
  .mcard-icon{
    width:64px;height:72px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.04),transparent);
    border-right:1px solid rgba(255,255,255,0.06);
    position:relative;
  }
  .mcard-icon svg{width:28px;height:28px;transition:transform 0.3s ease;}
  .mcard:hover .mcard-icon svg{transform:scale(1.18);}

  /* TEXT */
  .mcard-text{flex:1;padding:0 18px;}
  .mcard-name{
    font-family:'Orbitron',monospace;font-size:13px;font-weight:700;
    letter-spacing:2.5px;text-transform:uppercase;color:white;margin-bottom:3px;
  }
  .mcard-sub{font-size:10px;letter-spacing:2px;color:var(--accent);opacity:0.65;text-transform:uppercase;}

  /* ARROW */
  .mcard-arrow{
    padding:0 18px;opacity:0.3;
    font-size:16px;color:white;
    transition:opacity 0.2s,transform 0.2s;
    flex-shrink:0;
  }
  .mcard:hover .mcard-arrow{opacity:0.8;transform:translateX(3px);}

  /* INDEX NUMBER */
  .mcard-num{
    position:absolute;top:6px;right:10px;
    font-family:'Orbitron',monospace;font-size:9px;
    color:var(--accent);opacity:0.25;letter-spacing:1px;
  }

  /* CORNER ACCENTS */
  .mcc{position:absolute;width:8px;height:8px;opacity:0.5;}
  .mcc-tl{top:5px;left:9px;border-top:1px solid var(--accent);border-left:1px solid var(--accent);}
  .mcc-br{bottom:5px;right:5px;border-bottom:1px solid var(--accent);border-right:1px solid var(--accent);}

  /* ACCENT COLORS */
  .mcard-gero  {--accent:#00f5ff;}
  .mcard-emerg {--accent:#ff4466;}
  .mcard-nurs  {--accent:#aa44ff;}
  .mcard-medsurg{--accent:#00ff88;}

  /* STATUS */
  .status{
    margin-top:28px;display:flex;align-items:center;gap:8px;
    font-size:10px;letter-spacing:3px;color:rgba(0,245,255,0.35);
    text-transform:uppercase;position:relative;z-index:5;
    animation:fadeUp 1s ease 0.7s both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.5s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

  /* DONATE BUTTON */
  .donation-wrap{margin-top:20px;position:relative;z-index:5;animation:fadeUp 1s ease 0.9s both;}
  .donate-btn{
    position:relative;display:flex;align-items:center;gap:10px;
    padding:13px 30px;background:transparent;border:none;cursor:pointer;
    font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
    letter-spacing:4px;text-transform:uppercase;color:white;overflow:hidden;
    clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
    transition:transform 0.2s ease;
  }
  .donate-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,215,0,0.1),rgba(255,140,0,0.06));border:1px solid rgba(255,215,0,0.3);clip-path:inherit;transition:background 0.3s,border-color 0.3s;}
  .donate-btn::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,215,0,0.15),transparent);transition:left 0.5s ease;}
  .donate-btn:hover{transform:translateY(-2px);}
  .donate-btn:hover::before{background:linear-gradient(135deg,rgba(255,215,0,0.18),rgba(255,140,0,0.12));border-color:rgba(255,215,0,0.6);}
  .donate-btn:hover::after{left:100%;}
  .donate-icon{font-size:16px;filter:drop-shadow(0 0 5px gold);animation:hb 1.8s ease-in-out infinite;position:relative;z-index:1;}
  @keyframes hb{0%,100%{transform:scale(1);}14%{transform:scale(1.25);}28%{transform:scale(1);}42%{transform:scale(1.15);}56%{transform:scale(1);}}
  .donate-text{position:relative;z-index:1;background:linear-gradient(90deg,gold,#ffaa00,gold);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shine 3s linear infinite;}
  @keyframes shine{0%{background-position:0% center;}100%{background-position:200% center;}}
  .dc{position:absolute;width:7px;height:7px;opacity:0.6;}
  .dc-tl{top:4px;left:4px;border-top:1px solid gold;border-left:1px solid gold;}
  .dc-br{bottom:4px;right:4px;border-bottom:1px solid gold;border-right:1px solid gold;}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="scanlines"></div>

<div class="header">
  <div class="header-label">System Access</div>
  <h1>Exam <span>Gate</span></h1>
  <div class="header-line"></div>
</div>

<div class="card-list">

  <!-- GERONTOLOGY -->
  <div class="mcard mcard-gero" onclick="window.open('https://mahmoud755-bbb.github.io/gero-full-mcq-/','_blank')">
    <div class="mcard-bar"></div>
    <div class="mcard-icon">
      <!-- Old person / DNA icon for gerontology -->
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="7" r="4" stroke="#00f5ff" stroke-width="1.4"/>
        <path d="M7 24c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="#00f5ff" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M4 14c1.5-1 3 0 4.5-1S11 11 12.5 12" stroke="#00f5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <circle cx="5" cy="18" r="1.2" fill="#00f5ff" opacity="0.4"/>
        <path d="M5 19.5v4" stroke="#00f5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
        <path d="M3.5 21.5h3" stroke="#00f5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
      </svg>
    </div>
    <div class="mcard-text">
      <div class="mcard-name">Gerontology</div>
      <div class="mcard-sub">Geriatric Care · MCQ</div>
    </div>
    <div class="mcard-arrow">›</div>
    <div class="mcard-num">01</div>
    <div class="mcc mcc-tl"></div>
    <div class="mcc mcc-br"></div>
  </div>

  <!-- EMERGENCY -->
  <div class="mcard mcard-emerg" onclick="window.open('https://mahmoud755-bbb.github.io/emergency/','_blank')">
    <div class="mcard-bar"></div>
    <div class="mcard-icon">
      <!-- Cross / lightning bolt -->
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="11.5" y="3" width="5" height="22" rx="1" fill="#ff4466" opacity="0.15"/>
        <rect x="3" y="11.5" width="22" height="5" rx="1" fill="#ff4466" opacity="0.15"/>
        <rect x="11.5" y="3" width="5" height="22" rx="1" stroke="#ff4466" stroke-width="1.4"/>
        <rect x="3" y="11.5" width="22" height="5" rx="1" stroke="#ff4466" stroke-width="1.4"/>
        <circle cx="14" cy="14" r="2" fill="#ff4466" opacity="0.5"/>
      </svg>
    </div>
    <div class="mcard-text">
      <div class="mcard-name">Emergency</div>
      <div class="mcard-sub">Critical Care · MCQ</div>
    </div>
    <div class="mcard-arrow">›</div>
    <div class="mcard-num">02</div>
    <div class="mcc mcc-tl"></div>
    <div class="mcc mcc-br"></div>
  </div>

  <!-- NURSING CONCEPT -->
  <div class="mcard mcard-nurs" onclick="window.open('https://mahmoud755-bbb.github.io/consept/','_blank')">
    <div class="mcard-bar"></div>
    <div class="mcard-icon">
      <!-- Brain / neuron concept -->
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 5C10.5 5 7.5 7.8 7.5 11.2c0 1.8.7 3.3 1.9 4.4-.3.6-.4 1.3-.4 2C9 19.7 11.2 22 14 22s5-2.3 5-4.4c0-.7-.1-1.4-.4-2 1.2-1.1 1.9-2.6 1.9-4.4C20.5 7.8 17.5 5 14 5z" stroke="#aa44ff" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M14 5v17" stroke="#aa44ff" stroke-width="1" stroke-dasharray="2 2" opacity="0.4"/>
        <circle cx="14" cy="13" r="2" stroke="#aa44ff" stroke-width="1.2" opacity="0.7"/>
        <path d="M9.5 10.5c1.5.5 3 .5 4.5 0" stroke="#aa44ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
        <path d="M14 10.5c1.5.5 3 .5 4.5 0" stroke="#aa44ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
      </svg>
    </div>
    <div class="mcard-text">
      <div class="mcard-name">Nursing Concept</div>
      <div class="mcard-sub">Theory & Fundamentals</div>
    </div>
    <div class="mcard-arrow">›</div>
    <div class="mcard-num">03</div>
    <div class="mcc mcc-tl"></div>
    <div class="mcc mcc-br"></div>
  </div>

  <!-- MEDICAL SURGICAL II -->
  <div class="mcard mcard-medsurg" onclick="window.open('https://mahmoud755-bbb.github.io/mcq-medical-/','_blank')">
    <div class="mcard-bar"></div>
    <div class="mcard-icon">
      <!-- Scalpel / surgical -->
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 22L18 6" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M18 6l3 1.5-1.5 3L18 6z" fill="#00ff88" opacity="0.7"/>
        <path d="M8 20l2-2" stroke="#00ff88" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
        <circle cx="20" cy="8" r="3.5" stroke="#00ff88" stroke-width="1.3" opacity="0.3"/>
        <path d="M10 8h3M11.5 6.5v3" stroke="#00ff88" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
      </svg>
    </div>
    <div class="mcard-text">
      <div class="mcard-name">Med Surgical II</div>
      <div class="mcard-sub">Medical Surgery · MCQ</div>
    </div>
    <div class="mcard-arrow">›</div>
    <div class="mcard-num">04</div>
    <div class="mcc mcc-tl"></div>
    <div class="mcc mcc-br"></div>
  </div>

</div>

<div class="status">
  <div class="dot"></div>
  Systems online · 4 modules active
</div>

<div class="donation-wrap">
  <button class="donate-btn" onclick="window.open('https://mahmoud755-bbb.github.io/donation/','_blank')">
    <div class="dc dc-tl"></div>
    <div class="dc dc-br"></div>
    <span class="donate-icon">💛</span>
    <span class="donate-text">Support &amp; Donate</span>
  </button>
</div>

</body>
</html>
